name: AI Issue Reply
on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  ai-reply:
    if: ${{ github.event.issue }}
    runs-on: ubuntu-latest
    steps:
      - name: Get issue info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue view $ISSUE_NUMBER --json title,body,comments > issue.json
          echo "ISSUE_NUMBER=$ISSUE_NUMBER" >> $GITHUB_ENV

      - name: Call OpenRouter API
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ISSUE_NUMBER: ${{ env.ISSUE_NUMBER }}
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            COMMENT_BODY="${{ github.event.comment.body }}"
            COMMENT_AUTHOR="${{ github.event.comment.user.login }}"
            jq -n \
              --arg title "$(jq -r '.title' issue.json)" \
              --arg body "$(jq -r '.body // empty' issue.json)" \
              --arg comments "$(jq -r '.comments[] | "**\(.author.login):** \(.body)"' issue.json)" \
              --arg new_comment "$COMMENT_BODY" \
              --arg new_author "$COMMENT_AUTHOR" \
              '{
                model: "openrouter/free",
                messages: [
                  {role: "system", content: "You are a helpful AI assistant. Issue title is the topic, body is context, comments are conversation history."},
                  {role: "user", content: "Issue Title: \($title)\n\n---Conversation History---\n\($comments)\n\n---\nNew message from \($new_author): \($new_comment)"}
                ]
              }' > request.json
          else
            COMMENT_AUTHOR="${{ github.event.issue.user.login }}"
            jq -n \
              --arg title "$(jq -r '.title' issue.json)" \
              --arg body "$(jq -r '.body // empty' issue.json)" \
              --arg author "$COMMENT_AUTHOR" \
              '{
                model: "openrouter/free",
                messages: [
                  {role: "system", content: "You are a helpful AI assistant. Someone opened an issue. Greet them and ask for clarification if needed."},
                  {role: "user", content: "New issue by \($author):\nTitle: \($title)\n\n\($body)"}
                ]
              }' > request.json
          fi

          cat request.json

          RESPONSE=$(curl -s https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "Content-Type: application/json" \
            -H "HTTP-Referer: https://github.com/${{ github.repository }}" \
            -H "X-Title: AI Issue Reply" \
            -d @request.json)

          echo "$RESPONSE" > response.json
          cat response.json | jq .

      - name: Reply to issue
        if: ${{ success() }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ env.ISSUE_NUMBER }}
        run: |
          AI_REPLY=$(jq -r '.choices[0].message.content // empty' response.json)
          if [ -n "$AI_REPLY" ] && [ "$AI_REPLY" != "null" ]; then
            AUTHOR=$(if [ "${{ github.event_name }}" = "issue_comment" ]; then echo "${{ github.event.comment.user.login }}"; else echo "${{ github.event.issue.user.login }}"; fi)
            gh issue comment $ISSUE_NUMBER --body "@$AUTHOR $AI_REPLY"
          fi