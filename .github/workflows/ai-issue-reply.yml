name: AI Issue Reply
on:
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  ai-reply:
    if: ${{ github.event.issue }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get issue content
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          ISSUE_TITLE=$(gh issue view $ISSUE_NUMBER --json title -q '.title')
          ISSUE_BODY=$(gh issue view $ISSUE_NUMBER --json body -q '.body')
          echo "ISSUE_TITLE=$ISSUE_TITLE" >> $GITHUB_ENV
          echo "ISSUE_BODY=$ISSUE_BODY" >> $GITHUB_ENV

      - name: Get issue comments history
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        id: history
        run: |
          COMMENTS=$(gh issue view $ISSUE_NUMBER --json comments --jq '.comments[] | "**\(.author.login):** \(.body)"' | tac)
          echo "COMMENTS<<EOF" >> $GITHUB_ENV
          echo "$COMMENTS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Call OpenRouter API
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ISSUE_TITLE: ${{ env.ISSUE_TITLE }}
          ISSUE_BODY: ${{ env.ISSUE_BODY }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          COMMENTS: ${{ env.COMMENTS }}
        run: |
          RESPONSE=$(curl -s https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "Content-Type: application/json" \
            -H "HTTP-Referer: https://github.com/${{ github.repository }}" \
            -H "X-Title: AI Issue Reply" \
            -d '{
              "model": "openrouter/free",
              "messages": [
                {"role": "system", "content": "You are a helpful AI assistant that helps answer GitHub issue questions. Provide concise and helpful responses."},
                {"role": "user", "content": "Issue Title: '"$ISSUE_TITLE"'\n\nIssue Body:\n'"$ISSUE_BODY"'\n\n---Conversation History:---\n'"${COMMENTS}"'\n\n---\nNew Comment by '"$COMMENT_AUTHOR"':\n'"$COMMENT_BODY"'"}
              ]
            }')

          AI_REPLY=$(echo $RESPONSE | jq -r '.choices[0].message.content // empty')
          echo "AI_REPLY=$AI_REPLY" >> $GITHUB_ENV

      - name: Reply to issue
        if: ${{ env.AI_REPLY != '' && env.AI_REPLY != 'null' && env.AI_REPLY != empty }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ACTOR: ${{ github.event.comment.user.login }}
        run: |
          gh issue comment $ISSUE_NUMBER --body "@$ACTOR $AI_REPLY"