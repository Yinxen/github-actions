name: AI Issue Reply
on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  ai-reply:
    if: ${{ github.event.issue }}
    runs-on: ubuntu-latest
    steps:
      - name: Get issue info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          ISSUE_TITLE=$(gh issue view $ISSUE_NUMBER --json title -q '.title')
          ISSUE_BODY=$(gh issue view $ISSUE_NUMBER --json body -q '.body')
          echo "ISSUE_TITLE=$ISSUE_TITLE" >> $GITHUB_ENV
          echo "ISSUE_BODY=$ISSUE_BODY" >> $GITHUB_ENV

      - name: Get conversation history
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        id: history
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            # For comments, get all previous comments as history
            gh issue view $ISSUE_NUMBER --json comments --jq '.comments[] | {role: .author.login, content: .body}' > history.json
          else
            # For new issues, no history
            echo "[]" > history.json
          fi
          cat history.json

      - name: Build conversation
        id: conversation
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_BODY: ${{ env.ISSUE_BODY }}
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            # Title is the topic, body is initial context, comments are history
            python3 << 'PYTHON'
import json
import sys

with open('history.json') as f:
    comments = json.load(f)

messages = []
messages.append({"role": "system", "content": "You are a helpful AI assistant. The issue title is the topic, issue body provides context, and comments are the conversation history. Keep responses concise and helpful."})

# Build conversation from comments (skip the latest one if it's the trigger)
history_text = ""
for c in comments:
    role = "assistant" if c['role'] == 'github-actions[bot]' else "user"
    history_text += f"{c['role']}: {c['content']}\n"

# If it's a comment event, include the new comment
comment_body = """${COMMENT_BODY}"""
if comment_body:
    user_input = f"""Issue Title: ${ISSUE_TITLE}

---Conversation History---
{history_text}
---
New message from user: {comment_body}"""
else:
    # New issue - use body as user input
    user_input = f"""Issue Title: ${ISSUE_TITLE}

Issue Body:
${ISSUE_BODY}"""

messages.append({"role": "user", "content": user_input})
print(json.dumps(messages))
PYTHON
          else
            # New issue
            python3 << 'PYTHON'
import json

messages = []
messages.append({"role": "system", "content": "You are a helpful AI assistant. Someone just opened an issue. Greet them helpfully and ask for more details if needed."})
messages.append({"role": "user", "content": f"""Issue Title: ${ISSUE_TITLE}

Issue Body:
${ISSUE_BODY}"""})
print(json.dumps(messages))
PYTHON
          fi

      - name: Call OpenRouter API
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        id: api
        run: |
          MESSAGES=$(cat messages.json)
          RESPONSE=$(curl -s https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "Content-Type: application/json" \
            -H "HTTP-Referer: https://github.com/${{ github.repository }}" \
            -H "X-Title: AI Issue Reply" \
            -d "{\"model\": \"openrouter/free\", \"messages\": $MESSAGES}")

          echo "API_RESPONSE=$RESPONSE" >> $GITHUB_ENV
          echo "$RESPONSE" | jq .

      - name: Extract and reply
        if: ${{ success() }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
        run: |
          AI_REPLY=$(echo "$API_RESPONSE" | jq -r '.choices[0].message.content // empty')
          if [ -n "$AI_REPLY" ] && [ "$AI_REPLY" != "null" ]; then
            echo "AI Reply: $AI_REPLY"
            gh issue comment $ISSUE_NUMBER --body "@$COMMENT_AUTHOR $AI_REPLY"
          fi